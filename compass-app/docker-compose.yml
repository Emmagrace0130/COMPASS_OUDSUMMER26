name: compass-oudsummer26

services:
  backend:
    container_name: compass-backend
    build: ./backend
    env_file: ./backend/.env
    environment:
      - VECTOR_LIBRARY_PATH=/app/Vector_Library
      - FAISS_INDEX_PATH=/app/faiss_index
    volumes:
      - ../Vector_Library:/app/Vector_Library:ro
      - ./backend/faiss_index:/app/faiss_index
      - fastembed_cache:/root/.cache/fastembed
    extra_hosts:
      - "host.containers.internal:host-gateway"
    restart: unless-stopped

  frontend:
    container_name: compass-frontend
    build: ./frontend
    environment:
      - VIRTUAL_HOST=compass.axiomsystemslab.com
      - LETSENCRYPT_HOST=compass.axiomsystemslab.com
      - LETSENCRYPT_EMAIL=asl@utk.edu
    networks:
      - default
      - viridian_network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fastembed_cache:

networks:
  viridian_network:
    external: true
