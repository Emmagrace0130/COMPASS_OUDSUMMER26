# COMPASS OUD Research Assistant — nginx virtual host
#
# INSTALL (requires sudo):
#   sudo cp nginx-site.conf /etc/nginx/sites-available/compass.axiomsystemslab.com
#   sudo ln -s /etc/nginx/sites-available/compass.axiomsystemslab.com \
#              /etc/nginx/sites-enabled/compass.axiomsystemslab.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL CERT (first time only, if cert does not yet exist):
#   sudo certbot certonly --webroot -w /var/www/letsencrypt \
#        -d compass.axiomsystemslab.com
#
# The COMPASS stack must be running on port 8020 before this will work:
#   cd /path/to/compass-app && docker compose up -d

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name compass.axiomsystemslab.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name compass.axiomsystemslab.com;

    ssl_certificate     /etc/letsencrypt/live/compass.axiomsystemslab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compass.axiomsystemslab.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # All traffic → COMPASS frontend container (which proxies /chat, /health, /data to the backend)
    location / {
        proxy_pass         http://127.0.0.1:8020;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — LLM responses can take 30–90 s
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;

        # Disable buffering for streaming / SSE
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;
    }
}
